name: CI

# Commit message skip tokens (push only): [skip_tests], [skip ci], [ci skip]

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  repository_dispatch:
    types: [upstream-changed]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test execution'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  CARGO_INCREMENTAL: '0'
  BLVM_BUILD_TARGET: ${{ github.workspace }}/.build/gh-blvm-zmq-build/${{ github.run_id }}/target

jobs:
  setup:
    name: Setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      github.event_name != 'push' || github.event.head_commit == null ||
      (!contains(github.event.head_commit.message, '[skip ci]') &&
       !contains(github.event.head_commit.message, '[ci skip]') &&
       !contains(github.event.head_commit.message, '[no ci]'))
    outputs:
      cache-key: ${{ steps.setup-cache.outputs.cache-key }}
    steps:
      - name: Pre-flight disk cleanup
        run: |
          if [ -d "${{ github.workspace }}/.build/gh-blvm-zmq-build" ]; then
            find "${{ github.workspace }}/.build/gh-blvm-zmq-build" -mindepth 1 -maxdepth 1 -type d \
              -not -name "${{ github.run_id }}" -mmin +60 \
              -exec rm -rf {} + 2>/dev/null || true
          fi

      - uses: actions/checkout@v4

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Cache key
        id: setup-cache
        run: |
          CACHE_ROOT="${{ github.workspace }}/.build/runner-cache"
          DEPS_KEY=$(sha256sum Cargo.toml | cut -d' ' -f1)
          CACHE_KEY="${DEPS_KEY}"
          echo "cache-key=$CACHE_KEY" >> $GITHUB_OUTPUT
          mkdir -p "$CACHE_ROOT/cargo/$CACHE_KEY"/{registry,git} "$CACHE_ROOT/target/$CACHE_KEY"

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

  build:
    name: Build
    needs: setup
    runs-on: [self-hosted, Linux, X64, builds]
    steps:
      - uses: actions/checkout@v4

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Install system deps
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq pkg-config libssl-dev libzmq3-dev
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Qq openssl pkgconf zeromq >/dev/null 2>&1 || sudo pacman -Sy --noconfirm openssl pkgconf zeromq
          fi

      - name: Isolate CARGO_HOME
        run: |
          mkdir -p "${RUNNER_TEMP}/cargo"
          echo "CARGO_HOME=${RUNNER_TEMP}/cargo" >> "$GITHUB_ENV"

      - name: Cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}

      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Build and compile tests
        env:
          CARGO_TARGET_DIR: ${{ env.BLVM_BUILD_TARGET }}
        run: cargo test --no-run

      - name: Save Cargo cache
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: save

      - name: Prune old runner caches
        if: always()
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: prune

  test:
    name: Test
    needs: [setup, build]
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      github.event_name != 'push' || github.event.head_commit == null ||
      (!contains(github.event.head_commit.message, '[skip_tests]') &&
       !contains(github.event.head_commit.message, '[skip ci]'))
    steps:
      - uses: actions/checkout@v4

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Install system deps
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq pkg-config libssl-dev libzmq3-dev
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Qq openssl pkgconf zeromq >/dev/null 2>&1 || sudo pacman -Sy --noconfirm openssl pkgconf zeromq
          fi

      - name: Isolate CARGO_HOME
        run: |
          mkdir -p "${RUNNER_TEMP}/cargo"
          echo "CARGO_HOME=${RUNNER_TEMP}/cargo" >> "$GITHUB_ENV"

      - name: Cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}

      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Run tests
        env:
          CARGO_TARGET_DIR: ${{ env.BLVM_BUILD_TARGET }}
        run: cargo test

  clippy:
    name: Clippy + fmt
    needs: [setup, build]
    runs-on: [self-hosted, Linux, X64, builds]
    steps:
      - uses: actions/checkout@v4

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Install system deps
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq pkg-config libssl-dev libzmq3-dev
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Qq openssl pkgconf zeromq >/dev/null 2>&1 || sudo pacman -Sy --noconfirm openssl pkgconf zeromq
          fi

      - name: Isolate CARGO_HOME
        run: |
          mkdir -p "${RUNNER_TEMP}/cargo"
          echo "CARGO_HOME=${RUNNER_TEMP}/cargo" >> "$GITHUB_ENV"

      - name: Cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}

      - name: Restore Cargo cache
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: rustfmt
        env:
          CARGO_TARGET_DIR: ${{ env.BLVM_BUILD_TARGET }}
        run: cargo fmt --all -- --check

      - name: clippy
        env:
          CARGO_TARGET_DIR: ${{ env.BLVM_BUILD_TARGET }}
        run: |
          CARGO_INCREMENTAL=0 cargo clippy --bins --tests \
            -- -D clippy::uninlined_format_args -D warnings

  release:
    name: Release
    needs: [build, test, clippy]
    runs-on: [self-hosted, Linux, X64, builds]
    permissions:
      contents: write
    if: |
      always() &&
      needs.build.result == 'success' &&
      needs.test.result == 'success' &&
      needs.clippy.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[skip release]')))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          CURRENT=$(grep -A 5 '^\[package\]' Cargo.toml | grep '^version = ' | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          EXISTING_TAGS=$(git tag -l "v*" | sed 's/^v//' || true)
          PATCH=$((PATCH + 1))
          for i in $(seq 0 20); do
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            if echo "$EXISTING_TAGS" | grep -qxF "$VERSION"; then
              PATCH=$((PATCH + 1))
            else
              break
            fi
          done
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "version_tag=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "✅ Next version: v${MAJOR}.${MINOR}.${PATCH}"

      - name: Strip [patch.crates-io] path overrides
        run: |
          python3 -c "
          import re, pathlib
          p = pathlib.Path('Cargo.toml')
          text = p.read_text()
          text = re.sub(r'\n\[patch\.crates-io\].*', '', text, flags=re.DOTALL)
          p.write_text(text)
          print('Stripped [patch.crates-io] — using crates.io versions')
          "
          cargo generate-lockfile

      - name: Build release binary
        env:
          CARGO_TARGET_DIR: ${{ env.BLVM_BUILD_TARGET }}
          CARGO_INCREMENTAL: "0"
        run: |
          cargo build --release
          cp "$CARGO_TARGET_DIR/release/blvm-zmq" blvm-zmq-x86_64-linux

      - name: Compute sha256
        id: sha256
        run: |
          SHA=$(sha256sum blvm-zmq-x86_64-linux | awk '{print $1}')
          echo "x86_64_linux=$SHA" >> $GITHUB_OUTPUT
          echo "sha256: $SHA"

      - name: Create git tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_UPDATE_TOKEN }}
        run: |
          VERSION_TAG="${{ steps.version.outputs.version_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/BTCDecoded/blvm-zmq.git"
          if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
            echo "⚠️  Tag $VERSION_TAG already exists, skipping"
          else
            git tag -a "$VERSION_TAG" -m "Release $VERSION_TAG"
            git push origin "$VERSION_TAG"
          fi
          gh release create "$VERSION_TAG" \
            blvm-zmq-x86_64-linux \
            --title "blvm-zmq $VERSION_TAG" \
            --notes "Hot-loadable BLVM module providing ZeroMQ PUB notifications (hashblock, hashtx, rawblock, rawtx, sequence)." \
            --repo BTCDecoded/blvm-zmq 2>/dev/null \
            || echo "⚠️  Release already exists"

      - name: Update blvm registry/modules.json
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_UPDATE_TOKEN }}
        run: |
          VERSION_TAG="${{ steps.version.outputs.version_tag }}"
          SHA_X86_64="${{ steps.sha256.outputs.x86_64_linux }}"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/BTCDecoded/blvm.git" blvm-registry
          cd blvm-registry
          python3 - <<EOF
          import json
          version_tag = "${VERSION_TAG}"
          sha = "${SHA_X86_64}"
          with open("registry/modules.json") as f:
              entries = json.load(f)
          for entry in entries:
              if entry["name"] != "blvm-zmq":
                  continue
              entry["version"] = version_tag
              for platform, info in entry["binaries"].items():
                  base = info["url"].split("/releases/")[0] + "/releases"
                  artifact = info["url"].split("/")[-1]
                  info["url"] = f"{base}/download/{version_tag}/{artifact}"
                  if platform == "x86_64-linux":
                      info["sha256"] = sha
          with open("registry/modules.json", "w") as f:
              json.dump(entries, f, indent=2)
          print("Updated registry/modules.json")
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/modules.json
          git diff --staged --quiet || git commit -m "chore: update blvm-zmq to ${VERSION_TAG} in registry"
          git push
