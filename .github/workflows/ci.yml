name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  CARGO_INCREMENTAL: "1"

jobs:
  setup:
    name: Setup
    runs-on: [self-hosted, Linux, X64, builds]
    if: |
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]')))
    outputs:
      cache-key: ${{ steps.cache.outputs.cache-key }}
    steps:
      - name: Disk check
        uses: BTCDecoded/rust-ci/runner-disk-guard@main

      - uses: actions/checkout@v4

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - id: cache
        name: Cache key
        run: |
          DEPS_KEY=$(sha256sum Cargo.toml | cut -d' ' -f1)
          TOOLCHAIN=$(grep -E '^channel|rust-version' rust-toolchain.toml Cargo.toml 2>/dev/null | head -1 | sha256sum | cut -d' ' -f1 || echo "stable")
          CACHE_KEY="${DEPS_KEY}-${TOOLCHAIN}"
          echo "cache-key=$CACHE_KEY" >> "$GITHUB_OUTPUT"
          CACHE_ROOT="/tmp/runner-cache"
          mkdir -p "$CACHE_ROOT/cargo/$CACHE_KEY"/{registry,git} "$CACHE_ROOT/target/$CACHE_KEY"

  build:
    name: Build ${{ matrix.target }}
    needs: setup
    runs-on: ${{ matrix.runs_on }}
    if: |
      (github.event_name != 'push' || github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]')))
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs_on: [self-hosted, Linux, X64, builds]
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runs_on: [self-hosted, Linux, X64, builds]
            use_cross: true
          - target: x86_64-pc-windows-msvc
            runs_on: windows-2022
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main

      - name: Job-local HOME (Linux; avoid rustc ETXTBSY on shared rustup installs)
        if: runner.os == 'Linux'
        run: |
          mkdir -p "${RUNNER_TEMP}/blvm-zmq-ci-home"
          echo "HOME=${RUNNER_TEMP}/blvm-zmq-ci-home" >> "$GITHUB_ENV"

      - name: Cache bind env (Linux self-hosted)
        if: runner.os == 'Linux'
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: bind-env
          cache-key: ${{ needs.setup.outputs.cache-key }}-${{ matrix.target }}

      - name: Restore Cargo cache (Linux self-hosted)
        if: runner.os == 'Linux'
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: restore

      - name: Install Rust (Linux self-hosted)
        if: runner.os == 'Linux'
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Install Rust (Windows)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add Rust target (pinned toolchain)
        if: runner.os == 'Linux'
        run: rustup target add ${{ matrix.target }}

      - name: Install libzmq (Linux native)
        if: runner.os == 'Linux' && matrix.use_cross != true
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq libzmq3-dev
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Qq zeromq >/dev/null 2>&1 || sudo pacman -Sy --noconfirm zeromq pkgconf
          fi

      # zmq-sys 0.12 builds vendored libzmq as C++ with MSVC (Chocolatey libzmq is unused).
      - name: MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Regenerate lockfile for crates.io graph
        shell: bash
        run: |
          rm -f Cargo.lock
          cargo generate-lockfile

      - name: Install cross (aarch64 Linux)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      # pwsh: Git Bash puts Git/usr/bin first, so `link.exe` is the wrong binary (MSVC vs GNU).
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo build --release --target ${{ matrix.target }}

      - name: Save Cargo cache (Linux self-hosted)
        if: always() && runner.os == 'Linux'
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: save

      - name: Prune old runner caches (Linux self-hosted)
        if: always() && runner.os == 'Linux'
        uses: BTCDecoded/rust-ci/runner-cargo-cache@main
        with:
          operation: prune
