name: Release

# Pushing a version tag alone only creates a Git tag in GitHub; this workflow
# must run to build binaries and create the GitHub *Release* with assets.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.1)"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact_name: blvm-zmq-x86_64-linux
            binary_suffix: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact_name: blvm-zmq-aarch64-linux
            binary_suffix: ""
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            artifact_name: blvm-zmq-x86_64-windows.exe
            binary_suffix: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install libzmq (Ubuntu native)
        if: runner.os == 'Linux' && !matrix.use_cross
        run: sudo apt-get update && sudo apt-get install -y libzmq3-dev

      - name: Install libzmq (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install zeromq --no-progress -y
          # Expose the ZMQ include/lib paths for zmq-sys via pkg-config env vars.
          # choco installs to C:\ProgramData\chocolatey\lib\zeromq\lib
          ZMQ_ROOT="C:/ProgramData/chocolatey/lib/zeromq"
          echo "ZMQ_LIB_DIR=${ZMQ_ROOT}/lib" >> "$GITHUB_ENV"
          echo "ZMQ_INCLUDE_DIR=${ZMQ_ROOT}/include" >> "$GITHUB_ENV"

      - name: Install cross (for cross-compilation)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Strip [patch.crates-io] path overrides
        shell: python3 {0}
        run: |
          import re, pathlib, subprocess, os
          p = pathlib.Path("Cargo.toml")
          text = p.read_text()
          text = re.sub(r'\n\[patch\.crates-io\].*', '', text, flags=re.DOTALL)
          p.write_text(text)
          print("Stripped [patch.crates-io] — using crates.io versions")
          # Remove stale lockfile so cargo resolves fresh from the crates.io index
          lock = pathlib.Path("Cargo.lock")
          if lock.exists():
              lock.unlink()
          subprocess.run(["cargo", "update"], check=True)

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        env:
          CARGO_INCREMENTAL: "0"

      - name: Compute sha256
        id: sha256
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/blvm-zmq${{ matrix.binary_suffix }}"
          cp "$BINARY" "${{ matrix.artifact_name }}"
          if command -v sha256sum &>/dev/null; then
            SHA=$(sha256sum "${{ matrix.artifact_name }}" | awk '{print $1}')
          elif command -v shasum &>/dev/null; then
            SHA=$(shasum -a 256 "${{ matrix.artifact_name }}" | awk '{print $1}')
          else
            SHA=$(certutil -hashfile "${{ matrix.artifact_name }}" SHA256 | sed -n '2p' | tr -d ' \r')
          fi
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "$SHA  ${{ matrix.artifact_name }}" >> sha256sums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}
            sha256sums.txt

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Combine sha256sums
        run: |
          cat artifacts/sha256sums.txt | sort -u > sha256sums.txt
          cat sha256sums.txt

      - name: List artifacts (sanity check)
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.RELEASE_VERSION }}
          name: blvm-zmq ${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          fail_on_unmatched_files: true
          body: |
            ## blvm-zmq ${{ env.RELEASE_VERSION }}

            Hot-loadable BLVM module providing Bitcoin-compatible **ZeroMQ PUB** notifications (`hashblock`, `hashtx`, `rawblock`, `rawtx`, `sequence`). Configure bind endpoints in the module `config.toml`.

            ### Install

            ```sh
            # Via blvm-node marketplace (recommended):
            blvm-cli loadmodule blvm-zmq

            # Manual:
            mkdir -p modules/blvm-zmq
            curl -L <binary_url> -o modules/blvm-zmq/blvm-zmq
            chmod +x modules/blvm-zmq/blvm-zmq
            curl -L https://raw.githubusercontent.com/BTCDecoded/blvm-zmq/main/module.toml \
                 -o modules/blvm-zmq/module.toml
            ```

            ### Checksums

            See `sha256sums.txt` attached to this release.
          files: |
            artifacts/blvm-zmq-x86_64-linux
            artifacts/blvm-zmq-aarch64-linux
            artifacts/blvm-zmq-x86_64-windows.exe
            sha256sums.txt
          draft: false
          prerelease: ${{ contains(env.RELEASE_VERSION, '-') }}

  update-module-toml:
    name: Update module.toml with version and download hashes
    needs: release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download sha256sums from build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Patch module.toml
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          BASE_URL="https://github.com/BTCDecoded/blvm-zmq/releases/download/${VERSION}"

          SHA_X86_LINUX=$(grep     "blvm-zmq-x86_64-linux$"   artifacts/sha256sums.txt | awk '{print $1}')
          SHA_AARCH64_LINUX=$(grep "blvm-zmq-aarch64-linux$"  artifacts/sha256sums.txt | awk '{print $1}')
          SHA_X86_WINDOWS=$(grep   "blvm-zmq-x86_64-windows\.exe$" artifacts/sha256sums.txt | awk '{print $1}')

          VERSION="$VERSION" \
          BASE_URL="$BASE_URL" \
          SHA_X86_LINUX="$SHA_X86_LINUX" \
          SHA_AARCH64_LINUX="$SHA_AARCH64_LINUX" \
          SHA_X86_WINDOWS="$SHA_X86_WINDOWS" \
          python3 - <<'PYEOF'
          import re, pathlib, os

          version  = os.environ["VERSION"]
          base_url = os.environ["BASE_URL"]

          platforms = {
              "x86_64-linux":   ("blvm-zmq-x86_64-linux",   os.environ["SHA_X86_LINUX"]),
              "aarch64-linux":  ("blvm-zmq-aarch64-linux",  os.environ["SHA_AARCH64_LINUX"]),
              "x86_64-windows": ("blvm-zmq-x86_64-windows.exe", os.environ["SHA_X86_WINDOWS"]),
          }

          p = pathlib.Path("module.toml")
          text = p.read_text()

          text = re.sub(
              r'^(version\s*=\s*)"[^"]*"',
              rf'\g<1>"{version}"',
              text, flags=re.MULTILINE
          )

          lines = ["\n[downloads]"]
          for key, (artifact, sha) in platforms.items():
              url = f"{base_url}/{artifact}"
              lines.append(f'{key:<14}= {{ url = "{url}", sha256 = "{sha}" }}')
          new_downloads = "\n".join(lines) + "\n"

          if "[downloads]" in text:
              text = re.sub(r'\n\[downloads\].*', new_downloads, text, flags=re.DOTALL)
          else:
              text = text.rstrip("\n") + new_downloads

          p.write_text(text)
          print(f"module.toml updated: version={version}")
          PYEOF

      - name: Commit and push module.toml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module.toml
          git diff --staged --quiet && echo "No changes to module.toml" && exit 0
          git commit -m "chore: update downloads for ${{ env.RELEASE_VERSION }} [skip ci]"
          git push origin main
